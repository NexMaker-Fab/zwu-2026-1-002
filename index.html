<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jowywlz - 团队主页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Jowywlz</a>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="members/index.html">团队成员</a>
                <a href="project.html">期末项目</a>
                <a href="exercises.html">课程练习</a>
            </div>
        </nav>
    </header>

    <main>
        <!-- 团队介绍卡片 -->
        <section class="card">
            <div style="text-align: center; padding: 40px 20px;">
                <h1 style="font-size: 3rem; margin-bottom: 10px; color: var(--color-text);">Jowywlz</h1>
                <p style="font-size: 1.3rem; color: var(--color-text); font-style: italic; margin-bottom: 30px;">以代码为咒，以创意为杖。</p>
                
                <!-- 团队合照 -->
                <img src="images/team-photo.png" alt="团队合照" style="width: 100%; max-width: 800px; margin: 30px auto; display: block; border-radius: 12px; box-shadow: 0 4px 12px rgba(119, 92, 85, 0.15);">
                
                <p style="max-width: 600px; margin: 20px auto; line-height: 1.8;">
                    我们是一支充满激情与创造力的团队，致力于用技术实现梦想。
                    在这里，每一个想法都能变成现实，每一行代码都承载着我们的热情。
                </p>
                
                <a href="members/index.html" class="btn" style="margin-top: 20px;">查看团队成员</a>
            </div>
        </section>

        <!-- 快速导航 -->
        <section class="card-grid">
            <div class="card" style="text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 15px;">👥</div>
                <h2>团队成员</h2>
                <p>认识我们优秀的6位成员</p>
                <a href="members/index.html" class="btn btn-outline">了解更多</a>
            </div>

            <div class="card" style="text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 15px;">🚀</div>
                <h2>期末项目</h2>
                <p>查看我们的精彩项目</p>
                <a href="project.html" class="btn btn-outline">查看详情</a>
            </div>

            <div class="card" style="text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 15px;">📚</div>
                <h2>课程练习</h2>
                <p>探索我们的学习成果</p>
                <a href="exercises.html" class="btn btn-outline">开始浏览</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Jowywlz Team. All rights reserved.</p>
